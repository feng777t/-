<!DOCTYPE html>
<html>
<head>
  <title>问候小工具</title>

  <style>
    body {
      background: #f0f2f5;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #45a049;
    }

    #result {
      margin-top: 15px;
      color: #333;
    }
  </style>

</head>
<body>

  <div class="card">
    <h1>请输入你的名字 👇</h1>

    <input type="text" id="nameInput" placeholder="输入名字" onkeydown="handleKey(event)">
    <br>
    <button onclick="sayHello()">打招呼</button>

    <h2 id="result"></h2>
    <img id="meme" src="wave.png" style="width:100px; display:none;">
  </div>

<script>
  function sayHello() {
    const name = document.getElementById("nameInput").value;

    const images = ["dog.png", "cat.png", "haha.png", "angry.png"];

    if (name === "") {
      document.getElementById("result").innerText = "请输入名字！";
    } else {
      document.getElementById("result").innerText = "你好，" + name;

      // 随机选一张图
      const randomIndex = Math.floor(Math.random() * images.length);
      const randomImage = images[randomIndex];

      const img = document.getElementById("meme");
      img.src = randomImage;
      img.style.display = "block";
    }
  }

  function handleKey(event) {
    if (event.key === "Enter") {
      sayHello();
    }
  }
</script>

</body>
</html>
